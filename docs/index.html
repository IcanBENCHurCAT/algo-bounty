<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoBounty Documentation</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
        }
        nav {
            width: 250px;
            padding-right: 20px;
            border-right: 1px solid #eee;
            margin-right: 20px;
        }
        main {
            flex-grow: 1;
        }
        a {
            color: #0366d6;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        nav ul {
            list-style-type: none;
            padding: 0;
        }
        nav li {
            margin-bottom: 10px;
        }
        pre {
            background-color: #f6f8fa;
            padding: 16px;
            overflow: auto;
            border-radius: 3px;
        }
        code {
            background-color: #f6f8fa;
            padding: 0.2em 0.4em;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <nav>
        <h2>Documentation</h2>
        <ul id="nav-list">
            <li><a href="#" onclick="loadDoc('index.md')">Home</a></li>
            <li><a href="#" onclick="loadDoc('CONTRACTOR-BRIEF.md')">Contractor Brief</a></li>
            <li><a href="#" onclick="loadDoc('AP2-INTEGRATION.md')">AP2 Integration</a></li>
            <li><a href="#" onclick="loadDoc('v0-rust-chain-autopsy.md')">v0 Rust Chain Autopsy</a></li>
            <li><a href="#" onclick="loadDoc('v1-teal-escrow-contract.md')">v1 TEAL Escrow</a></li>
            <li><a href="#" onclick="loadDoc('v2-karma-reputation-system.md')">v2 Karma Reputation</a></li>
            <li><a href="#" onclick="loadDoc('v4-dashboard-api.md')">v4 Dashboard API</a></li>
            <li><a href="#" onclick="loadDoc('v5-github-integration.md')">v5 GitHub Integration</a></li>
            <li><a href="#" onclick="loadDoc('v6-hitm-design.md')">v6 HITM Design</a></li>
            <li><a href="#" onclick="loadDoc('v7-handover.md')">v7 Handover</a></li>
            <li><a href="#" onclick="loadDoc('v8-redis-karma-bootstrap.md')">v8 Redis Karma Bootstrap</a></li>
        </ul>
    </nav>
    <main>
        <div id="content">Loading...</div>
    </main>

    <script>
        function loadDoc(filename) {
            fetch(filename)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text();
                })
                .then(text => {
                    document.getElementById('content').innerHTML = marked.parse(text);
                })
                .catch(error => {
                    document.getElementById('content').innerHTML = '<p>Error loading content.</p>';
                    console.error('There has been a problem with your fetch operation:', error);
                });
        }

        // Load index by default
        loadDoc('index.md');
    </script>
</body>
</html>
