name: AlgoBounty CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Python Gateway Tests ───────────────────────────────────────────────────
  test-gateway:
    name: Gateway Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-asyncio
        pip install -r requirements.txt

    - name: Run test suite
      env:
        PYTHONPATH: .
        TESTING: "True"
        SECRET_KEY: "ci_test_secret_key_at_least_32_characters_long"
      run: |
        pytest tests/ -v --cov=gateway --cov-report=term-missing --cov-report=xml

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: coverage.xml

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: MishaKav/pytest-coverage-comment@v1.1.53
      with:
        pytest-xml-coverage-path: ./coverage.xml
        github-token: ${{ secrets.GITHUB_TOKEN }}

  # ── Dashboard TypeScript Check ─────────────────────────────────────────────
  typecheck-dashboard:
    name: Dashboard TypeCheck
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      working-directory: dashboard
      run: npm install

    - name: TypeScript type check
      working-directory: dashboard
      env:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_ALGORAND_NETWORK: "testnet"
      run: npm run typecheck

    - name: ESLint
      working-directory: dashboard
      run: npm run lint
      continue-on-error: true

  # ── Dashboard Build Smoke Test ─────────────────────────────────────────────
  build-dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest
    needs: [typecheck-dashboard]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      working-directory: dashboard
      run: npm install

    - name: Build Next.js (standalone)
      working-directory: dashboard
      env:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_ALGORAND_NETWORK: "testnet"
        NEXT_TELEMETRY_DISABLED: "1"
      run: npm run build
