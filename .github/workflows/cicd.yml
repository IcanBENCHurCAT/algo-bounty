name: AlgoBounty CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PROJECT_ID: soul-seeker-500816
  REGION: us-central1
  GATEWAY_SERVICE: algo-bounty-gateway
  FRONTEND_SERVICE: algo-bounty-frontend

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest fastapi uvicorn PyJWT cryptography sqlalchemy httpx py-algorand-sdk

    - name: Run Test Suite
      env:
        PYTHONPATH: .
      run: |
        pytest tests/ -v

  deploy-gateway:
    needs: test
    runs-on: ubuntu-latest
    environment: deployment # Routes this job through codeowner gate
    outputs:
      gateway-url: ${{ steps.deploy.outputs.gateway-url }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ env.PROJECT_ID }}

    - name: Configure Docker for GCR
      run: gcloud auth configure-docker

    - name: Build and deploy Gateway
      id: deploy
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        GCP_PROJECT_ID: ${{ env.PROJECT_ID }}
      run: |
        IMAGE_TAG="gcr.io/${PROJECT_ID}/${GATEWAY_SERVICE}:$(git rev-parse --short HEAD)-$(date +%s)"

        # Build and push image
        gcloud builds submit . --tag "${IMAGE_TAG}" --timeout=600

        # Deploy to Cloud Run
        gcloud run deploy ${GATEWAY_SERVICE} \
          --project="${PROJECT_ID}" \
          --region="${REGION}" \
          --image="${IMAGE_TAG}" \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --memory=512Mi \
          --cpu=1 \
          --concurrency=250 \
          --max-instances=10 \
          --timeout=300 \
          --automatic-scaling-min-instances=0 \
          --set-env-vars="ALGORAND_NETWORK=testnet" \
          --set-env-vars="SUPABASE_URL=${SUPABASE_URL}" \
          --set-secrets="SECRET_KEY=projects/${PROJECT_ID}/secrets/algobounty_secret_key:latest" \
          --set-secrets="PLATFORM_PRIVATE_KEY=projects/${PROJECT_ID}/secrets/algobounty_platform_private_key:latest" \
          --set-secrets="GITHUB_WEBHOOK_SECRET=projects/${PROJECT_ID}/secrets/algobounty_github_webhook_secret:latest" \
          --set-secrets="SUPABASE_SERVICE_ROLE_KEY=projects/${PROJECT_ID}/secrets/algobounty_supabase_service_role_key:latest"

        echo "gateway-url=$(gcloud run services describe ${GATEWAY_SERVICE} --project="${PROJECT_ID}" --region="${REGION}" --format='value(status.url)')" >> $GITHUB_OUTPUT

  deploy-frontend:
    needs: deploy-gateway
    runs-on: ubuntu-latest
    environment: deployment # Routes this job through codeowner gate

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ env.PROJECT_ID }}

    - name: Configure Docker for GCR
      run: gcloud auth configure-docker

    - name: Build and deploy Frontend
      id: deploy
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      run: |
        IMAGE_TAG="gcr.io/${PROJECT_ID}/${FRONTEND_SERVICE}:$(git rev-parse --short HEAD)-$(date +%s)"

        # Build and push image from dashboard directory
        gcloud builds submit dashboard/ --tag "${IMAGE_TAG}"

        # Deploy to Cloud Run
        gcloud run deploy ${FRONTEND_SERVICE} \
          --project="${PROJECT_ID}" \
          --region="${REGION}" \
          --image="${IMAGE_TAG}" \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --memory=256Mi \
          --cpu=1 \
          --concurrency=250 \
          --timeout=60 \
          --min-scale=0 \
          --set-env-vars="NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}" \
          --set-env-vars="NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}" \
          --set-env-vars="NEXT_PUBLIC_API_URL=${{ needs.deploy-gateway.outputs.gateway-url }}"

        echo "frontend-url=$(gcloud run services describe ${FRONTEND_SERVICE} --project="${PROJECT_ID}" --region="${REGION}" --format='value(status.url)')" >> $GITHUB_OUTPUT

    - name: Post deployment summary
      if: success()
      run: |
        echo "## AlgoBounty Deployment Successful" >> $GITHUB_STEP_SUMMARY
        echo "- **Gateway**: ${{ needs.deploy-gateway.outputs.gateway-url }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Frontend**: ${{ steps.deploy.outputs.frontend-url }}" >> $GITHUB_STEP_SUMMARY
