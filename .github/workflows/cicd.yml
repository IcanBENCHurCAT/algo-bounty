name: AlgoBounty CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-asyncio
        pip install -r requirements.txt

    - name: Run Test Suite
      env:
        PYTHONPATH: .
        TESTING: "True"
        SECRET_KEY: "ci_test_secret_key_at_least_32_characters_long"
      run: |
        pytest tests/ -v --cov=gateway --cov-report=term-missing --cov-report=xml

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml

    - name: Comment on PR with Coverage
      if: github.event_name == 'pull_request'
      uses: MishaKav/pytest-coverage-comment@v1.1.53
      with:
        pytest-xml-coverage-path: ./coverage.xml
        github-token: ${{ secrets.GITHUB_TOKEN }}

