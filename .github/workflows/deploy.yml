name: Deploy

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

env:
  PROJECT_ID: 546240368861
  REGION: us-central1
  GATEWAY_SERVICE: algo-bounty-gateway
  FRONTEND_SERVICE: algo-bounty-frontend

jobs:
  deploy-testnet-gateway:
    name: Deploy Testnet Gateway
    runs-on: ubuntu-latest
    environment: deployment # Routes this job through codeowner gate
    outputs:
      gateway-url: ${{ steps.deploy.outputs.gateway-url }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ env.PROJECT_ID }}

    - name: Configure Docker for GCR
      run: gcloud auth configure-docker

    - name: Generate Gateway Image Tag
      run: |
        echo "IMAGE_TAG=gcr.io/${{ env.PROJECT_ID }}/${{ env.GATEWAY_SERVICE }}:$(git rev-parse --short HEAD)-$(date +%s)" >> $GITHUB_ENV

    - name: Build and Push Gateway Image
      run: |
        cp gateway/Dockerfile Dockerfile
        gcloud builds submit . --tag "${{ env.IMAGE_TAG }}" --timeout=600

    - name: Deploy Gateway to Cloud Run
      run: |
        gcloud run deploy ${{ env.GATEWAY_SERVICE }} \
          --project="${{ env.PROJECT_ID }}" \
          --region="${{ env.REGION }}" \
          --image="${{ env.IMAGE_TAG }}" \
          --allow-unauthenticated \
          --port=8080 \
          --memory=512Mi \
          --cpu=1 \
          --concurrency=250 \
          --max-instances=10 \
          --timeout=300 \
          --min-instances=0 \
          --set-env-vars="ALGORAND_NETWORK=testnet" \
          --set-env-vars="SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
          --set-secrets="DATABASE_URL=projects/${{ env.PROJECT_ID }}/secrets/algobounty-db-url:latest" \
          --set-secrets="SECRET_KEY=projects/${{ env.PROJECT_ID }}/secrets/algobounty-jwt-secret:latest" \
          --set-secrets="PLATFORM_PRIVATE_KEY=projects/${{ env.PROJECT_ID }}/secrets/algobounty_platform_private_key:latest" \
          --set-secrets="GITHUB_WEBHOOK_SECRET=projects/${{ env.PROJECT_ID }}/secrets/algobounty-github-webhook-secret:latest" \
          --set-secrets="SUPABASE_SERVICE_ROLE_KEY=projects/${{ env.PROJECT_ID }}/secrets/algobounty_supabase_service_role_key:latest" \
          --set-secrets="GITHUB_PRIVATE_KEY=projects/${{ env.PROJECT_ID }}/secrets/algobounty-github-private-key:latest"

    - name: Deploy Indexer to Cloud Run
      run: |
        gcloud run deploy algo-bounty-indexer \
          --project="${{ env.PROJECT_ID }}" \
          --region="${{ env.REGION }}" \
          --image="${{ env.IMAGE_TAG }}" \
          --command="python" \
          --args="gateway/worker.py" \
          --memory=256Mi \
          --cpu=0.25 \
          --min-instances=1 \
          --max-instances=1 \
          --no-cpu-throttling \
          --set-env-vars="ALGORAND_NETWORK=testnet" \
          --set-env-vars="SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
          --set-secrets="DATABASE_URL=projects/${{ env.PROJECT_ID }}/secrets/algobounty-db-url:latest" \
          --set-secrets="SECRET_KEY=projects/${{ env.PROJECT_ID }}/secrets/algobounty-jwt-secret:latest" \
          --set-secrets="PLATFORM_PRIVATE_KEY=projects/${{ env.PROJECT_ID }}/secrets/algobounty_platform_private_key:latest" \
          --set-secrets="GITHUB_WEBHOOK_SECRET=projects/${{ env.PROJECT_ID }}/secrets/algobounty-github-webhook-secret:latest" \
          --set-secrets="SUPABASE_SERVICE_ROLE_KEY=projects/${{ env.PROJECT_ID }}/secrets/algobounty_supabase_service_role_key:latest" \
          --set-secrets="GITHUB_PRIVATE_KEY=projects/${{ env.PROJECT_ID }}/secrets/algobounty-github-private-key:latest"

    - name: Set Gateway URL Output
      id: deploy
      run: |
        echo "gateway-url=$(gcloud run services describe ${{ env.GATEWAY_SERVICE }} --project="${{ env.PROJECT_ID }}" --region="${{ env.REGION }}" --format='value(status.url)')" >> $GITHUB_OUTPUT

  deploy-testnet-frontend:
    name: Deploy Testnet Frontend
    needs: deploy-testnet-gateway
    runs-on: ubuntu-latest
    environment: deployment # Routes this job through codeowner gate

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ env.PROJECT_ID }}

    - name: Configure Docker for GCR
      run: gcloud auth configure-docker

    - name: Generate Frontend Image Tag
      run: |
        echo "IMAGE_TAG=gcr.io/${{ env.PROJECT_ID }}/${{ env.FRONTEND_SERVICE }}:$(git rev-parse --short HEAD)-$(date +%s)" >> $GITHUB_ENV

    - name: Build and Push Frontend Image
      run: |
        gcloud builds submit dashboard/ --tag "${{ env.IMAGE_TAG }}"

    - name: Deploy Frontend to Cloud Run
      run: |
        gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
          --project="${{ env.PROJECT_ID }}" \
          --region="${{ env.REGION }}" \
          --image="${{ env.IMAGE_TAG }}" \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --memory=256Mi \
          --cpu=1 \
          --concurrency=250 \
          --timeout=60 \
          --min-instances=0 \
          --set-env-vars="NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
          --set-env-vars="NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
          --set-env-vars="NEXT_PUBLIC_API_URL=${{ needs.deploy-testnet-gateway.outputs.gateway-url }}"

    - name: Set Frontend URL Output
      id: deploy
      run: |
        echo "frontend-url=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} --project="${{ env.PROJECT_ID }}" --region="${{ env.REGION }}" --format='value(status.url)')" >> $GITHUB_OUTPUT

    - name: Post deployment summary
      if: success()
      run: |
        echo "## AlgoBounty Deployment Successful" >> $GITHUB_STEP_SUMMARY
        echo "- **Gateway**: ${{ needs.deploy-testnet-gateway.outputs.gateway-url }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Frontend**: ${{ steps.deploy.outputs.frontend-url }}" >> $GITHUB_STEP_SUMMARY
