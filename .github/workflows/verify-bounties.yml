name: AlgoBounty CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-state: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest fastapi uvicorn PyJWT cryptography sqlalchemy httpx py-algorand-sdk

    - name: Run Test Suite
      env:
        PYTHONPATH: .
      run: |
        pytest tests/ -v
